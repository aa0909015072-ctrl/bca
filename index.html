<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>書卷謎蹤：秘境典籍 Mystery-Codex</title>
    <style>
        :root {
            --warm-bg: #fff9e6;
            --dark-bg: #0d0d0d;
            --sweet-pink: #ff85a1;
            --horror-red: #8b0000;
            --text-color: #5a4a42;
        }

        /* 基礎設定 */
        body, html {
            margin: 0; padding: 0;
            font-family: "serif", "Microsoft JhengHei", sans-serif;
            scroll-behavior: smooth;
            background-color: var(--warm-bg);
            color: var(--text-color);
            transition: background 1.5s ease, color 1.5s ease;
            overflow-x: hidden;
        }

        .section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        /* 打字機動畫 */
        .typewriter h1 {
            overflow: hidden;
            border-right: .15em solid var(--sweet-pink);
            white-space: nowrap;
            margin: 0 auto;
            letter-spacing: .15em;
            animation: typing 3.5s steps(30, end), blink-caret .5s step-end infinite;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: var(--sweet-pink) } }

        /* 角色感應區優化 */
        .character-map-container {
            position: relative;
            width: 90%;
            max-width: 900px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border: 8px solid white;
        }

        .main-char-img { width: 100%; display: block; transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .character-map-container:hover .main-char-img { transform: scale(1.05) rotate(1deg) brightness(0.4); }

        .hotspot { position: absolute; top: 0; height: 100%; z-index: 5; cursor: crosshair; }
        .char-name {
            opacity: 0; color: white; font-size: 1.8rem;
            background: rgba(139, 0, 0, 0.7); padding: 15px 30px;
            border-radius: 50px; transition: 0.4s;
            transform: translateY(30px);
        }
        .hotspot:hover .char-name { opacity: 1; transform: translateY(0); }

        /* 影片區 */
        .video-container {
            width: 90%; max-width: 800px;
            border-radius: 15px; overflow: hidden;
            border: 6px solid #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: 0.8s;
        }

        /* 黑化狀態控制 */
        .corrupted { background-color: var(--dark-bg) !important; color: var(--horror-red) !important; }
        .corrupted .video-container { border-color: var(--horror-red); filter: sepia(1) saturate(2); }
        
        /* 最終訊息閃爍效果 */
        .glitch-text {
            font-size: 4.5rem;
            font-weight: bold;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0.05em 0 0 rgba(255,0,0,.75), -0.025em -0.05em 0 rgba(0,255,0,.75), 0.025em 0.05em 0 rgba(0,0,255,.75);
            animation: glitch 500ms infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255,0,0,.75), -0.05em -0.025em 0 rgba(0,255,0,.75); }
            15% { text-shadow: -0.05em -0.025em 0 rgba(255,0,0,.75), 0.025em 0.025em 0 rgba(0,255,0,.75); }
            100% { text-shadow: -0.025em 0 0 rgba(255,0,0,.75), -0.025em -0.025em 0 rgba(0,255,0,.75); }
        }

        .dark-content { opacity: 0; transform: scale(0.8); transition: 2s all cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .show-msg { opacity: 1; transform: scale(1); }

    </style>
</head>
<body>

    <div class="section typewriter">
        <h1>書卷謎蹤：秘境典籍</h1>
        <h3 style="color: #8b7355; font-style: italic;">Mystery-Codex</h3>
        <p style="margin-top: 30px; letter-spacing: 2px;">當你翻開這頁，契約便已成立。</p>
    </div>

    <div class="section" style="background: rgba(255,255,255,0.2);">
        <h2 style="margin-bottom: 30px;">— 守護典籍之人 —</h2>
        <div class="character-map-container">
            <img src="1000012960.jpg" alt="四位少女" class="main-char-img">
            <div class="hotspot" style="left: 0%; width: 25%; display: flex; align-items: center; justify-content: center;"><span class="char-name">沈墨煙</span></div>
            <div class="hotspot" style="left: 25%; width: 25%; display: flex; align-items: center; justify-content: center;"><span class="char-name">艾莉</span></div>
            <div class="hotspot" style="left: 50%; width: 25%; display: flex; align-items: center; justify-content: center;"><span class="char-name">希薇</span></div>
            <div class="hotspot" style="left: 75%; width: 25%; display: flex; align-items: center; justify-content: center;"><span class="char-name">古韻涵</span></div>
        </div>
        <p style="margin-top: 20px; font-size: 0.9rem; opacity: 0.7;">( 觸碰少女們以窺探她們的真名 )</p>
    </div>

    <div class="section" id="video-section">
        <h2>— 預告片 —</h2>
        <div class="video-container">
            <iframe width="100%" height="100%" 
                src="https://www.youtube.com/embed/wFXF1R04SnA" 
                title="YouTube video player" frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                allowfullscreen style="aspect-ratio: 16 / 9;">
            </iframe>
        </div>
    </div>

    <div class="section" id="horror-section">
        <div class="dark-content" id="final-msg">
            <h2 class="glitch-text">所 謂 的 女 神</h2>
            <p style="font-size: 1.5rem; letter-spacing: 5px;">輪 迴 再 輪 迴 ... 絕 望 痛 苦 的 循 環</p>
            <div style="margin-top: 50px; border: 1px solid red; padding: 20px; cursor: pointer;" onclick="alert('妳逃不掉的。')">
                <span>[ 接受命運 ]</span>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('scroll', function() {
            const videoSection = document.getElementById('video-section');
            const finalMsg = document.getElementById('final-msg');
            const scrollPos = window.scrollY;

            if (scrollPos > videoSection.offsetTop - 100) {
                document.body.classList.add('corrupted');
                finalMsg.classList.add('show-msg');
            } else {
                document.body.classList.remove('corrupted');
                finalMsg.classList.remove('show-msg');
            }
        });
    </script>
</body>
</html>
